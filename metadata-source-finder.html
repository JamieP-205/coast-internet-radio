<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Metadata Source Finder - Coast Internet Radio</title>
  <style>
    :root { color-scheme: dark; --gold:#d6aa3f; --bg:#07111f; --card:#101f33; --text:#f6f1e8; --muted:#b9c1cc; --border:rgba(214,170,63,.35); }
    body { margin:0; font-family: Arial, sans-serif; background: radial-gradient(circle at top, #152743, var(--bg)); color:var(--text); }
    main { width:min(1050px, calc(100% - 28px)); margin:0 auto; padding:30px 0 50px; }
    .card { background:rgba(16,31,51,.92); border:1px solid var(--border); border-radius:18px; padding:18px; box-shadow:0 20px 60px rgba(0,0,0,.35); margin:16px 0; }
    h1 { color:var(--gold); margin:0 0 10px; font-size:clamp(1.8rem, 5vw, 3rem); }
    h2 { color:var(--gold); margin:0 0 10px; }
    p { color:var(--muted); line-height:1.55; }
    button, a.button { display:inline-flex; align-items:center; justify-content:center; gap:8px; border:1px solid var(--gold); background:linear-gradient(135deg,#f1d27a,#c38a26); color:#111; font-weight:800; padding:12px 16px; border-radius:999px; text-decoration:none; }
    pre { overflow:auto; white-space:pre-wrap; background:#030913; border:1px solid rgba(255,255,255,.12); border-radius:14px; padding:14px; font-size:.88rem; line-height:1.45; }
    .status { font-weight:800; color:var(--gold); }
    .small { font-size:.92rem; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <p class="small">Private technical check</p>
      <h1>Metadata Source Finder</h1>
      <p>This checks the old website page and common Icecast status pages to see whether there is a cleaner source for Now Playing / Recently Played. It does not change the website.</p>
      <button id="runTest">Run source check</button>
      <a class="button" href="/">Back to homepage</a>
    </section>
    <section class="card">
      <h2>Result</h2>
      <p id="summary" class="status">Waiting to run...</p>
      <pre id="output">Press Run source check.</pre>
    </section>
  </main>
  <script>
    const output = document.getElementById('output');
    const summary = document.getElementById('summary');
    async function run() {
      summary.textContent = 'Checking sources...';
      output.textContent = 'Loading...';
      try {
        const res = await fetch('/.netlify/functions/metadata-source-finder?ts=' + Date.now(), { cache: 'no-store' });
        const data = await res.json();
        summary.textContent = data.conclusion || 'Finished';
        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        summary.textContent = 'Test failed';
        output.textContent = String(err && err.message ? err.message : err);
      }
    }
    document.getElementById('runTest').addEventListener('click', run);
    run();
  </script>
</body>
</html>
