# Coast Internet Radio final static deploy
[build]
  publish = "."

# Form recipient is configured via the Netlify dashboard:
# Site → Forms → song-request → Settings → Form notifications.

[[redirects]]
  from = "/cookies.html"
  to = "/terms.html"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."collect-play-history"]
  schedule = "* * * * *"
